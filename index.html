<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عقارات مأرب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>العقارات المتاحة</h2>
    <div id="list">جاري التحميل...</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzKvzVkABwJsAKK_m9A-cFCRuBzhhLKP4lQQjwFRa1PMz8P9C-YzFJx_jDrp1M-jt4/exec";

async function load() {
    try {
        const res = await fetch(API + "?action=public");
        const data = await res.json();
        let html = "";
        data.forEach(i => {
            const mainImg = i.images ? i.images.split("|")[0] : "https://via.placeholder.com/400x200?text=No+Image";
            html += `
            <div class="card">
                <img src="${mainImg}" alt="${i.title}">
                <div class="card-content">
                    <h3>${i.title}</h3>
                    <p>📍 ${i.location}</p>
                    <p style="color:var(--accent-color); font-weight:bold;">💰 ${i.price} ريال</p>
                    <br>
                    <a href="detail.html?id=${i.id}" class="btn-link">عرض التفاصيل الكاملة</a>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html || "لا توجد عقارات منشورة حالياً.";
    } catch (e) {
        document.getElementById("list").innerHTML = "خطأ في تحميل البيانات.";
    }
}
load();
</script>
</body>
</html>
