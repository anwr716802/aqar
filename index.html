<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عقارات مأرب</title>
<style>
  body{direction:rtl; font-family:Arial; padding:10px; background:#f4f4f4;}
  .card{background:#white; padding:15px; margin:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  img{width:100%; max-height:200px; object-fit:cover; border-radius:5px;}
</style>
</head>
<body>
<h2>العقارات المتاحة</h2>
<div id="list">جاري التحميل...</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzKvzVkABwJsAKK_m9A-cFCRuBzhhLKP4lQQjwFRa1PMz8P9C-YzFJx_jDrp1M-jt4/exec";

async function load() {
  const res = await fetch(API + "?action=public");
  const data = await res.json();
  let html = "";
  data.forEach(i => {
    const mainImg = i.images ? i.images.split("|")[0] : "";
    html += `<div class="card">
      ${mainImg ? `<img src="${mainImg}">` : ""}
      <h3>${i.title}</h3>
      <p>📍 ${i.location} | 💰 ${i.price} ريال</p>
      <a href="detail.html?id=${i.id}">عرض التفاصيل</a>
    </div>`;
  });
  document.getElementById("list").innerHTML = html || "لا توجد عقارات منشورة.";
}
load();
</script>
  
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
