<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عقارات مأرب</title>
<style>
body{direction:rtl;font-family:Arial;margin:0;padding:10px;background:#f5f5f5}
.card{background:#fff;border:1px solid #ddd;margin:10px;padding:10px;border-radius:8px}
img{width:100%;max-height:200px;object-fit:cover;border-radius:6px}
input{width:95%;padding:8px;margin:10px 0}
button{padding:6px 10px;margin:5px}
.price{color:green;font-weight:bold}
</style>
</head>
<body>

<h2>العقارات المتاحة</h2>

<input id="search" placeholder="ابحث عن عقار..." oninput="load()">

<div id="list"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbyYoK3gl1Vgoekc_8PD-4jwvI0ng1Pi740uXggMAxU98m59mZQBYpmIqX_eyclq-tOpMg/exec?action=public";

let allData=[];

async function load(){
  let res = await fetch(API);
  allData = await res.json();

  let q = search.value.toLowerCase();

  let filtered = allData.filter(i =>
    (i.title || "").toLowerCase().includes(q) ||
    (i.location || "").toLowerCase().includes(q)
  );

  let html="";

  filtered.forEach(i=>{
    let img = i.images ? i.images.split("|")[0] : "";

    html+=`
    <div class="card">

      ${img ? `<img src="${img}">` : ""}

      <h3>${i.title}</h3>

      <div class="price">${i.price} ريال</div>

      <div>${i.location}</div>

      <p>${i.description || ""}</p>

      <button onclick="openDetail('${i.id}')">عرض التفاصيل</button>

      <a href="https://wa.me/967XXXXXXXXX?text=أريد%20استفسار%20عن%20${encodeURIComponent(i.title)}">
        واتساب
      </a>

    </div>`;
  });

  list.innerHTML = html;
}

function openDetail(id){
  location.href = "detail.html?id=" + id;
}

load();
</script>
</script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
