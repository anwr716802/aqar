<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة العقارات</title>
<style>
body{direction:rtl;font-family:Arial}
.card{border:1px solid #ccc;margin:10px;padding:10px}
img{width:80px;height:80px;object-fit:cover}
input,textarea{width:90%;margin:5px}
</style>
</head>
<body>

<h2>إدارة العقارات</h2>

<input id="search" placeholder="بحث..." oninput="load()">

<hr>

<input id="id" type="hidden">

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">
<input id="location" placeholder="الموقع">
<textarea id="description" placeholder="الوصف"></textarea>

<label>الصور</label>
<input type="file" id="images" multiple>

<label>الفيديو</label>
<input type="file" id="video">

<button onclick="save()">حفظ</button>

<div id="list"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbyYoK3gl1Vgoekc_8PD-4jwvI0ng1Pi740uXggMAxU98m59mZQBYpmIqX_eyclq-tOpMg/exec";
const CLOUD="dxjzks7xl";
const PRESET="myupload";

// رفع ملف (Cloudinary)
async function upload(file,type="image"){
  let fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset",PRESET);

  let r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/${type}/upload`,{
    method:"POST",
    body:fd
  });

  let d=await r.json();
  return d.secure_url;
}

async function uploadImages(files){
  let arr=[];
  for(let f of files) arr.push(await upload(f,"image"));
  return arr.join("|");
}

async function uploadVideo(file){
  return await upload(file,"video");
}

async function save(){
  let id=id.value;

  let imgFiles=images.files;
  let vidFile=video.files[0];

  let img = imgFiles.length ? await uploadImages(imgFiles) : null;
  let vid = vidFile ? await uploadVideo(vidFile) : null;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action: id?"edit":"add",
      id,
      title:title.value,
      price:price.value,
      location:location.value,
      description:description.value,
      images:img,
      video:vid,
      status:"published"
    })
  });

  load();
}

async function load(){
  let res=await fetch(API+"?action=my");
  let data=await res.json();

  let q=search.value?.toLowerCase()||"";

  let html="";
  data.filter(i=>i.title.toLowerCase().includes(q)).forEach(i=>{
    html+=`
    <div class="card">
      <b>${i.title}</b><br>
      ${i.price}<br>
      ${i.location}<br>

      <button onclick="editItem('${i.id}','${i.title}','${i.price}','${i.location}','${i.description}')">تعديل</button>
      <button onclick="del('${i.id}')">حذف</button>
      <button onclick="status('${i.id}','published')">نشر</button>
      <button onclick="status('${i.id}','draft')">إخفاء</button>
      <a href="detail.html?id=${i.id}">تفاصيل</a>
    </div>`;
  });

  list.innerHTML=html;
}

function editItem(i,t,p,l,d){
  id.value=i;
  title.value=t;
  price.value=p;
  location.value=l;
  description.value=d;
}

function del(i){
  fetch(API,{method:"POST",body:JSON.stringify({action:"delete",id:i})})
  .then(load);
}

function status(i,s){
  fetch(API,{method:"POST",body:JSON.stringify({action:"status",id:i,status:s})})
  .then(load);
}

load();
</script>
</script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
  </html>
