

  <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة العقارات</title>
<style>
body{direction:rtl;font-family:Arial}
.card{border:1px solid #ccc;margin:10px;padding:10px}
img{width:80px;height:80px;object-fit:cover}
input,textarea{width:90%;margin:5px}
button{margin:4px}
</style>
</head>
<body>

<h2>إدارة العقارات</h2>

<input id="search" placeholder="بحث..." oninput="load()">

<hr>

<input id="id" type="hidden">

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">
<input id="location" placeholder="الموقع">
<textarea id="description" placeholder="الوصف"></textarea>

<label>الصور</label>
<input type="file" id="images" multiple>

<label>الفيديو</label>
<input type="file" id="video">

<button onclick="save()">حفظ</button>

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwYo5YE8BVmlNGB0UWjZk27DbTABFw7RDYrQKB3Jb4QAIhwehucyvfSA7fqzgpsEIW-Ng/exec";
const CLOUD = "dxjzks7xl";
const PRESET = "myupload";

const $ = (id) => document.getElementById(id);

function escapeHtml(text) {
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

// رفع ملف (Cloudinary)
async function upload(file, type = "image") {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", PRESET);

  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/${type}/upload`, {
    method: "POST",
    body: fd
  });

  if (!r.ok) {
    throw new Error("Cloudinary upload failed");
  }

  const d = await r.json();
  return d.secure_url;
}

async function uploadImages(files) {
  const arr = [];
  for (const f of files) arr.push(await upload(f, "image"));
  return arr.join("|");
}

async function uploadVideo(file) {
  return await upload(file, "video");
}

async function save() {
  const itemId = $("id").value;

  const imgFiles = $("images").files;
  const vidFile = $("video").files[0];

  const img = imgFiles.length ? await uploadImages(imgFiles) : "";
  const vid = vidFile ? await uploadVideo(vidFile) : "";

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: itemId ? "edit" : "add",
      id: itemId,
      title: $("title").value,
      price: $("price").value,
      location: $("location").value,
      description: $("description").value,
      images: img,
      video: vid,
      status: "published"
    })
  });

  $("id").value = "";
  $("images").value = "";
  $("video").value = "";
  load();
}

async function load() {
  const res = await fetch(API + "?action=my&_=" + Date.now());
  const data = await res.json();

  const q = ($("search").value || "").toLowerCase();

  let html = "";
  data.filter(i => String(i.title || "").toLowerCase().includes(q)).forEach(i => {
    html += `
    <div class="card">
      <b>${escapeHtml(i.title)}</b><br>
      ${escapeHtml(i.price)}<br>
      ${escapeHtml(i.location)}<br>

      <button onclick='editItem(${JSON.stringify(i.id)},${JSON.stringify(i.title)},${JSON.stringify(i.price)},${JSON.stringify(i.location)},${JSON.stringify(i.description)})'>تعديل</button>
      <button onclick='del(${JSON.stringify(i.id)})'>حذف</button>
      <button onclick='status(${JSON.stringify(i.id)},"published")'>نشر</button>
      <button onclick='status(${JSON.stringify(i.id)},"draft")'>إخفاء</button>
      <a href="detail.html?id=${encodeURIComponent(i.id)}">تفاصيل</a>
    </div>`;
  });

  $("list").innerHTML = html;
}

function editItem(i, t, p, l, d) {
  $("id").value = i;
  $("title").value = t;
  $("price").value = p;
  $("location").value = l;
  $("description").value = d;
}

function del(i) {
  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ action: "delete", id: i })
  }).then(load);
}

function status(i, s) {
  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ action: "status", id: i, status: s })
  }).then(load);
}

load();
</script>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

</body>
</html>
