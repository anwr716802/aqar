<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العقار</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container detail-box">
    <div id="box">جاري تحميل التفاصيل...</div>
    <br>
    <a href="index.html" style="color:var(--primary-color)">← العودة للرئيسية</a>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwYo5YE8BVmlNGB0UWjZk27DbTABFw7RDYrQKB3Jb4QAIhwehucyvfSA7fqzgpsEIW-Ng/exec";
const box = document.getElementById("box");
const id = new URLSearchParams(location.search).get("id");

fetch(API + "?action=one&id=" + encodeURIComponent(id))
  .then(r => r.json())
  .then(i => {
    box.innerHTML = `
      <h2>${i.title || "بدون عنوان"}</h2>
      <div class="card-content">
          <p style="white-space: pre-wrap; margin-bottom:15px;">${i.description || ""}</p>
          <p><b>السعر:</b> ${i.price || ""} ريال</p>
          <p><b>الموقع:</b> ${i.location || ""}</p>
      </div>

      <div class="gallery">
        ${(i.images ? i.images.split("|").map(x => `<img src="${x}" class="property-img">`).join("") : "")}
      </div>

      ${(i.video ? `<video controls src="${i.video}"></video>` : "")}

      <a class="btn-link whatsapp-btn" href="https://wa.me/967XXXXXXXXX?text=${encodeURIComponent("أريد استفسار عن " + (i.title || ""))}">
        تواصل عبر واتساب
      </a>
    `;
  })
  .catch(err => {
    box.innerHTML = "<p>تعذر تحميل التفاصيل، تأكد من اتصالك بالإنترنت.</p>";
  });
</script>
</body>
</html>
